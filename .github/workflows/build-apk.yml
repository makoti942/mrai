name: Build VoiceAgent APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          echo "=== Checking tools ==="
          echo "JAVA_HOME=$JAVA_HOME"
          which java && java -version
          echo "ANDROID_HOME=/usr/local/lib/android/sdk"
          ls /usr/local/lib/android/sdk/ 2>&1
          ls /usr/local/lib/android/sdk/platforms/ 2>&1

          echo "=== Creating wrapper ==="
          cd android
          gradle wrapper --gradle-version 8.5 2>&1
          echo "wrapper exit: $?"

          echo "=== Wrapper files ==="
          ls -la gradlew 2>&1
          ls -la gradle/wrapper/ 2>&1

          echo "=== Building ==="
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
          echo "build exit: $?"
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VoiceAgent-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
