name: Build VoiceAgent APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        id: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Build APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          echo "=== Tool versions ==="
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          which java && java -version
          which gradle 2>/dev/null && echo "gradle found" || echo "gradle not in PATH"
          which sdkmanager 2>/dev/null && echo "sdkmanager found" || echo "sdkmanager not found"
          ls /usr/local/lib/android/sdk/platforms/ 2>/dev/null && echo "platforms exist" || echo "no platforms dir"

          echo "=== Build ==="
          cd android

          # Use gradle if available, otherwise download
          if which gradle >/dev/null 2>&1; then
            echo "Using system Gradle"
            gradle wrapper --gradle-version 8.5
          else
            echo "Downloading Gradle"
            curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/
            /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          fi

          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VoiceAgent-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
